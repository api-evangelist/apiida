naftiko: 1.0.0-alpha2
info:
  label: APIIDA API Gateway Manager — Gateways
  description: 'APIIDA API Gateway Manager — Gateways. 5 operations. Lead operation: APIIDA List Managed Gateways. Self-contained
    Naftiko capability covering one Apiida business surface.'
  tags:
  - Apiida
  - Gateways
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APIIDA_API_KEY: APIIDA_API_KEY
capability:
  consumes:
  - type: http
    namespace: api-gateway-manager-gateways
    baseUri: https://{tenant}.backend.apiida.io
    description: APIIDA API Gateway Manager — Gateways business capability. Self-contained, no shared references.
    resources:
    - name: gateways
      path: /gateways
      operations:
      - name: listgateways
        method: GET
        description: APIIDA List Managed Gateways
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: registergateway
        method: POST
        description: APIIDA Register a Gateway
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: gateways-gatewayId
      path: /gateways/{gatewayId}
      operations:
      - name: getgateway
        method: GET
        description: APIIDA Get Gateway Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updategateway
        method: PUT
        description: APIIDA Update Gateway Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: removegateway
        method: DELETE
        description: APIIDA Remove a Gateway
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.APIIDA_API_KEY}}'
  exposes:
  - type: rest
    namespace: api-gateway-manager-gateways-rest
    port: 8080
    description: REST adapter for APIIDA API Gateway Manager — Gateways. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/gateways
      name: gateways
      description: REST surface for gateways.
      operations:
      - method: GET
        name: listgateways
        description: APIIDA List Managed Gateways
        call: api-gateway-manager-gateways.listgateways
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: registergateway
        description: APIIDA Register a Gateway
        call: api-gateway-manager-gateways.registergateway
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/gateways/{gatewayid}
      name: gateways-gatewayid
      description: REST surface for gateways-gatewayId.
      operations:
      - method: GET
        name: getgateway
        description: APIIDA Get Gateway Details
        call: api-gateway-manager-gateways.getgateway
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updategateway
        description: APIIDA Update Gateway Configuration
        call: api-gateway-manager-gateways.updategateway
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: removegateway
        description: APIIDA Remove a Gateway
        call: api-gateway-manager-gateways.removegateway
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: api-gateway-manager-gateways-mcp
    port: 9090
    transport: http
    description: MCP adapter for APIIDA API Gateway Manager — Gateways. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: apiida-list-managed-gateways
      description: APIIDA List Managed Gateways
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: api-gateway-manager-gateways.listgateways
      outputParameters:
      - type: object
        mapping: $.
    - name: apiida-register-gateway
      description: APIIDA Register a Gateway
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: api-gateway-manager-gateways.registergateway
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: apiida-get-gateway-details
      description: APIIDA Get Gateway Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: api-gateway-manager-gateways.getgateway
      outputParameters:
      - type: object
        mapping: $.
    - name: apiida-update-gateway-configuration
      description: APIIDA Update Gateway Configuration
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: api-gateway-manager-gateways.updategateway
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: apiida-remove-gateway
      description: APIIDA Remove a Gateway
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: api-gateway-manager-gateways.removegateway
      outputParameters:
      - type: object
        mapping: $.
