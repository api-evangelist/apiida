naftiko: 1.0.0-alpha2
info:
  label: APIIDA Federated API Management
  description: Unified workflow for federated API management across multiple API gateways using APIIDA - validating specs,
    deploying APIs, monitoring gateways, and managing API lifecycle from a central control plane.
  tags:
  - APIIDA
  - API Management
  - Federated
  - Gateway
  - Enterprise
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    APIIDA_API_KEY: APIIDA_API_KEY
capability:
  consumes:
  - type: http
    namespace: apiida-control-plane
    baseUri: https://api.apiida.com/control-plane
    description: APIIDA API Control Plane REST API.
    authentication:
      type: bearer
      token: '{{APIIDA_API_KEY}}'
    resources:
    - name: apis
      path: /apis
      description: Manage APIs across gateways.
      operations:
      - name: list-apis
        method: GET
        description: List all APIs.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-api-version
        method: POST
        description: Create a new API version.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: validate-spec
        method: POST
        description: Validate an OpenAPI proxy specification.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deploy-api
        method: POST
        description: Deploy API to gateways.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: apiida-gateway-manager
    baseUri: https://api.apiida.com/gateway-manager
    description: APIIDA API Gateway Manager REST API.
    authentication:
      type: bearer
      token: '{{APIIDA_API_KEY}}'
    resources:
    - name: gateways
      path: /gateways
      description: Manage Layer7 gateways.
      operations:
      - name: list-gateways
        method: GET
        description: List all managed gateways.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: register-gateway
        method: POST
        description: Register a new gateway.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-gateway-metrics
        method: GET
        description: Get monitoring metrics for a gateway.
        inputParameters:
        - name: gatewayId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: apiida-federated-api
    description: Unified REST API for APIIDA federated API management.
    resources:
    - path: /v1/apis
      operations:
      - method: GET
        name: list-apis
        description: List all managed APIs.
        call: apiida-control-plane.list-apis
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/gateways
      operations:
      - method: GET
        name: list-gateways
        description: List all managed gateways.
        call: apiida-gateway-manager.list-gateways
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: apiida-federated-mcp
    transport: http
    description: MCP server for AI-assisted APIIDA federated API management.
    tools:
    - name: list-managed-apis
      description: List all APIs managed across the APIIDA federated control plane.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: apiida-control-plane.list-apis
      outputParameters:
      - type: object
        mapping: $.
    - name: validate-api-specification
      description: Validate an OpenAPI proxy specification before deployment.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: apiida-control-plane.validate-spec
      outputParameters:
      - type: object
        mapping: $.
    - name: deploy-api-to-gateways
      description: Deploy a validated API to one or more gateway environments.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: apiida-control-plane.deploy-api
      outputParameters:
      - type: object
        mapping: $.
    - name: list-managed-gateways
      description: List all Broadcom Layer7 gateways registered in the gateway manager.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: apiida-gateway-manager.list-gateways
      outputParameters:
      - type: object
        mapping: $.
    - name: get-gateway-metrics
      description: Get monitoring and performance metrics for a specific gateway.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: apiida-gateway-manager.get-gateway-metrics
      outputParameters:
      - type: object
        mapping: $.
