        url: json-schema/apiida-api.json
      - type: JSONSchema
        url: json-schema/apiida-deployment.json
      - type: JSON-LD
        url: json-ld/apiida-context.jsonld
  - aid: apiida:api-gateway-manager
    name: APIIDA API Gateway Manager
    description: >-
      REST API for the APIIDA API Gateway Manager, enabling programmatic
      management of Broadcom Layer7 API gateways. Supports gateway
      registration, API deployment and migration, monitoring and metrics
      collection, and alarm configuration across managed gateway instances.
    humanURL: https://apiida.com/product/apiida-api-gateway-manager/
    baseURL: https://api.apiida.com
    tags:
      - API Deployments
