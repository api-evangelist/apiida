apis:
  - aid: apiida:api-control-plane
    name: APIIDA API Control Plane
    description: >-
      REST API for the APIIDA API Control Plane, enabling programmatic
      management of APIs across multiple API gateways. Supports validation
      of proxy specifications, API version management, and deployment to
      gateways from a central federated control plane.
    humanURL: https://apiida.com/product/apiida-api-control-plane/
    baseURL: https://api.apiida.com
    tags:
      - API Lifecycle
      - API Management
      - Federated Control Plane
      - Governance
    properties:
