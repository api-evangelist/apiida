      - url: json-schema/apiida-deployment.json
        type: JSONSchema
      - url: json-ld/apiida-context.jsonld
        type: JSONLD
    description: >-
      REST API for the APIIDA API Gateway Manager, enabling programmatic
      management of Broadcom Layer7 API gateways. Supports gateway
